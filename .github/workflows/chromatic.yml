name: Chromatic

on:
  pull_request:
    branches: [dev, prod]
  push:
    branches: [dev, prod]

permissions:
  contents: read

jobs:
  chromatic:
    runs-on: ubuntu-latest
    # Skip on PRs from forks (no access to secrets) — keeps the workflow from
    # spuriously failing on community contributions.
    if: ${{ github.event.pull_request.head.repo.fork == false || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Chromatic needs full history for baseline comparison

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile

      - name: Publish to Chromatic
        # The action exits cleanly with a "missing project token" message when
        # CHROMATIC_PROJECT_TOKEN isn't set — keeps PRs mergeable until the
        # secret is added by a maintainer.
        uses: chromaui/action@95a9f8a6c43c44dccdcb88c3ccc24cd0e027f7c8 # v13.1.4
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: storybook:build
          onlyChanged: true
          exitZeroOnChanges: true
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
